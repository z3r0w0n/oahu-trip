<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aloha Oahu">
<meta name="theme-color" content="#faf6f0">
<title>Aloha · Oahu</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf6f0;--bg-card:#fff;--bg-soft:#f4ede0;
  --ink:#2d2a26;--ink-soft:#6b6660;--ink-faint:#a39e95;
  --line:#e8dfd0;--line-soft:#f0e8d8;
  --accent:#c2410c;
  --gold:#b8860b;--palm:#4a7c3a;
  --serif:"Fraunces","Cormorant Garamond",Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
.th-blue{--da:#0e6e8c;--ds:#daeef5;--di:#073e51}
.th-green{--da:#4a7c3a;--ds:#dff0d8;--di:#2a4720}
.th-amber{--da:#b8860b;--ds:#fdf3d0;--di:#6b4d05}
.th-pink{--da:#b03060;--ds:#fce8ef;--di:#5e1933}
.th-purple{--da:#6b46a8;--ds:#ede8f7;--di:#3a2462}
.th-teal{--da:#0c7a73;--ds:#d8f0ee;--di:#064341}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;
  overscroll-behavior:none}
body{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:88px}
h1,h2{font-family:var(--serif);font-weight:500;letter-spacing:-.01em}
h1{font-size:34px;line-height:1.08}
h2{font-size:22px;line-height:1.15}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:50;
background:rgba(250,246,240,.93);
backdrop-filter:saturate(180%) blur(16px);
-webkit-backdrop-filter:saturate(180%) blur(16px);
border-bottom:.5px solid var(–line)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:11px 18px}
.brand{display:flex;align-items:center;gap:7px;font-family:var(–serif);font-size:17px;font-weight:500;color:var(–ink)}
.brand-pip{width:7px;height:7px;border-radius:50%;background:var(–accent)}
.menu-btn{width:34px;height:34px;border:none;background:transparent;color:var(–ink);
border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:background .15s}
.menu-btn:hover{background:var(–bg-soft)}
.menu-btn svg{display:block}

/* PAGES */
.page{display:none;padding:0 18px;animation:fi .22s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* DAY PICKER */
.daypicker{
display:flex;gap:7px;overflow-x:auto;padding:10px 18px;
scrollbar-width:none;-ms-overflow-style:none;
background:var(–bg);border-bottom:.5px solid var(–line);
position:sticky;top:58px;z-index:40;margin:0 -18px}
.daypicker::-webkit-scrollbar{display:none}
.daychip{flex-shrink:0;background:transparent;border:.5px solid var(–line);
border-radius:10px;padding:6px 11px;font-size:11.5px;font-family:var(–sans);
color:var(–ink-soft);cursor:pointer;transition:all .15s;
text-align:center;min-width:54px;line-height:1.25;font-weight:500}
.daychip .chipdate{display:block;font-size:10px;margin-top:1px;opacity:.75}
.daychip.active{background:var(–ink);color:var(–bg);border-color:var(–ink)}
.daychip.today{border-color:var(–accent);color:var(–accent)}
.daychip.today.active{background:var(–accent);border-color:var(–accent);color:#fff}

/* TODAY HERO */
.hero{padding:26px 0 22px;border-bottom:.5px solid var(–line);position:relative;overflow:hidden}
.hero-palm{display:none}
.hero>*{position:relative;z-index:1}
.hero-greeting{font-size:12.5px;color:var(–ink-soft);margin-bottom:3px}
.hero-greeting strong{color:var(–accent);font-weight:500}
.hero h1{margin-top:3px;font-size:30px;letter-spacing:-.022em}
.hero-meta{display:flex;gap:14px;margin-top:12px;font-size:12.5px;color:var(–ink-soft)}
.hero-meta span{display:inline-flex;align-items:center;gap:5px}
.hero-meta svg{flex-shrink:0}
.hero-summary{font-family:var(–serif);font-style:italic;font-size:15.5px;line-height:1.5;
color:var(–ink-soft);margin-top:14px;padding-right:80px}

/* WEATHER STRIP */
.wxstrip{display:flex;gap:0;border-bottom:.5px solid var(–line)}
.wxcell{flex:1;padding:13px 0;border-right:.5px solid var(–line)}
.wxcell:last-child{border-right:none;padding-left:14px}
.wxcell:first-child{padding-right:0}
.wx-lbl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(–ink-faint);margin-bottom:3px;font-weight:600}
.wx-val{font-family:var(–serif);font-size:16px;font-weight:500;line-height:1.2}
.wx-val.sm{font-size:12.5px;font-style:italic;font-weight:400}

/* TIMELINE */
.timeline{padding:18px 0 8px}
.tl-event{display:grid;grid-template-columns:58px 1fr;gap:11px;
padding:9px 0;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tl-event:not(:last-child)::before{
content:””;position:absolute;left:65px;top:36px;bottom:-9px;
width:1.5px;background:linear-gradient(to bottom,var(–line) 55%,transparent)}
.evtime{font-family:var(–serif);font-size:12.5px;font-weight:500;
text-align:right;color:var(–ink-soft);padding-top:13px;letter-spacing:-.01em}
.evtime small{font-size:9.5px;letter-spacing:.1em;color:var(–ink-faint);display:block;margin-top:1px}
.evbody{border-radius:13px;background:var(–bg-card);border:.5px solid var(–line);
padding:12px 14px;transition:transform .15s ease,border-color .2s,box-shadow .2s;
position:relative;overflow:hidden}
.evbody::before{content:””;position:absolute;left:0;top:0;bottom:0;width:3px;
background:var(–da,var(–accent));border-radius:0}
.tl-event:active .evbody{transform:scale(.987)}
.tl-event.open .evbody{border-color:var(–da,var(–accent));box-shadow:0 2px 10px rgba(60,40,20,.08)}
.evrow{display:flex;align-items:center;gap:9px}
.evicon{width:31px;height:31px;border-radius:8px;flex-shrink:0;
background:var(–ds,var(–bg-soft));color:var(–di,var(–accent));
display:flex;align-items:center;justify-content:center}
.evicon svg{display:block}
.evtitle{font-size:14px;font-weight:500;flex:1;line-height:1.3;color:var(–ink)}
.evchev{color:var(–ink-faint);transition:transform .2s;flex-shrink:0}
.evchev svg{display:block}
.tl-event.open .evchev{transform:rotate(180deg)}
.evdesc{font-size:12.5px;color:var(–ink-soft);margin-top:5px;padding-left:40px;line-height:1.5}

/* HINT PILLS — shown collapsed, act as preview */
.hintrow{display:flex;gap:4px;margin-top:8px;padding-left:40px;flex-wrap:wrap}
.hint{display:inline-flex;align-items:center;gap:3px;
font-size:10px;font-weight:500;padding:2px 7px;
border-radius:999px;border:.5px solid;letter-spacing:.01em}
.hint svg{display:block;flex-shrink:0}
.h-outfit{background:#f3e8ff;color:#6b21a8;border-color:#d8b4fe}
.h-weather{background:#daeef5;color:#073e51;border-color:#9fd4e6}
.h-alt{background:#dff0d8;color:#2a4720;border-color:#9ecf88}
.h-note{background:#fdf3d0;color:#6b4d05;border-color:#f5d87a}
.h-gentle{background:#f3e8ff;color:#6b21a8;border-color:#d8b4fe}
.h-urgent{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.h-book{background:#fce8ef;color:#5e1933;border-color:#f4abc3}
.h-optional{background:var(–line-soft);color:var(–ink-faint);border-color:var(–line)}

/* BADGE PILLS — category tags */
.badgerow{display:flex;gap:4px;margin-top:5px;padding-left:40px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;
padding:2px 7px;border-radius:999px;font-weight:500;
background:var(–ds,var(–bg-soft));color:var(–di,var(–accent))}
.badge.urgent{background:#fee2e2;color:#991b1b}
.badge.optional{background:var(–line-soft);color:var(–ink-faint)}
.badge.highlight{background:#fef3c7;color:#854d0e}
.badge.gentle{background:#f3e8ff;color:#6b21a8}

/* EXPANDED DETAILS */
.evdetails{max-height:0;overflow:hidden;transition:max-height .3s ease}
.tl-event.open .evdetails{max-height:800px}
.det-inner{padding:12px 0 2px 40px}
.det-sep{height:.5px;background:var(–line-soft);margin-bottom:13px}
.detblock{margin-bottom:12px}
.detblock:last-child{margin-bottom:0}
.detlbl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.detlbl svg{display:block;flex-shrink:0}
.detlbl.outfit{color:#6b21a8}
.detlbl.weather{color:#0c5a7a}
.detlbl.alt{color:#2a4720}
.detlbl.note{color:#6b4d05}
.detval{font-size:12.5px;line-height:1.55;color:var(–ink)}
.detval ul{padding-left:14px;margin-top:3px}
.detval li{margin-bottom:2px;list-style:“→ “;padding-left:3px}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
width:100%;max-width:480px;display:flex;justify-content:space-around;
background:rgba(250,246,240,.95);
backdrop-filter:saturate(180%) blur(16px);
-webkit-backdrop-filter:saturate(180%) blur(16px);
border-top:.5px solid var(–line);z-index:100;
padding:7px 0 calc(7px + env(safe-area-inset-bottom))}
.navbtn{background:transparent;border:none;color:var(–ink-faint);flex:1;
display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:2px;padding:7px 4px;cursor:pointer;transition:color .15s;font-family:var(–sans)}
.navbtn svg{display:block}
.navbtn .nlbl{font-size:10px;font-weight:500;letter-spacing:.02em;margin-top:1px}
.navbtn.active{color:var(–accent)}

/* TRIP OVERVIEW */
.trip-hero{padding:30px 0 24px}
.trip-hero h1{font-size:44px;letter-spacing:-.03em;line-height:1;margin-bottom:5px}
.trip-hero h1 em{font-style:italic;color:var(–accent)}
.trip-hero .dates{font-family:var(–serif);font-size:15px;color:var(–ink-soft);font-style:italic}
.sec-title{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
color:var(–ink-faint);margin:22px 0 11px;font-weight:600;
display:flex;align-items:center;gap:10px}
.sec-title::after{content:””;flex:1;height:.5px;background:var(–line)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.metastat{background:var(–bg-card);border:.5px solid var(–line);border-radius:12px;padding:13px}
.metastat .mlbl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(–ink-faint);font-weight:600}
.metastat .mval{font-family:var(–serif);font-size:16px;font-weight:500;margin-top:3px}
.metastat .msub{font-size:11px;color:var(–ink-soft);margin-top:1px}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.contactbtn{background:var(–bg-card);border:.5px solid var(–line);border-radius:12px;
padding:11px 13px;display:flex;align-items:center;gap:10px;
text-decoration:none;color:var(–ink);cursor:pointer;
transition:transform .15s;-webkit-tap-highlight-color:transparent}
.contactbtn:active{transform:scale(.97)}
.ci{width:31px;height:31px;border-radius:8px;background:var(–bg-soft);
color:var(–accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci svg{display:block}
.ct{font-size:12px;font-weight:500;line-height:1.25}
.ct small{font-size:10.5px;color:var(–ink-faint);font-weight:400;display:block}
.daycards{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.daycard{background:var(–bg-card);border:.5px solid var(–line);border-radius:13px;
padding:13px 15px;display:flex;align-items:center;gap:13px;
cursor:pointer;-webkit-tap-highlight-color:transparent;
transition:transform .15s;position:relative;overflow:hidden}
.daycard::before{content:””;position:absolute;left:0;top:0;bottom:0;width:3px;
background:var(–da,var(–accent))}
.daycard:active{transform:scale(.99)}
.dcnum{font-family:var(–serif);font-size:26px;font-weight:500;color:var(–da,var(–accent));
line-height:1;text-align:center;min-width:42px;font-style:italic}
.dcnum small{display:block;font-size:9.5px;letter-spacing:.12em;color:var(–ink-faint);
margin-top:3px;font-style:normal}
.dcbody{flex:1;min-width:0}
.dcbody .dctitle{font-size:14.5px;font-weight:500;line-height:1.25;margin-bottom:2px}
.dcbody .dcsub{font-size:11.5px;color:var(–ink-soft)}
.dcarrow{color:var(–ink-faint);flex-shrink:0}
.dcarrow svg{display:block}

/* LIST PAGES */
.listpage h1{margin:26px 0 6px}
.listpage .pagesub{color:var(–ink-soft);font-size:14px;margin-bottom:20px;
font-family:var(–serif);font-style:italic}
.progress-bar{background:var(–bg-card);border:.5px solid var(–line);border-radius:12px;
padding:13px;margin-bottom:18px}
.pb-row{display:flex;justify-content:space-between;margin-bottom:7px;font-size:12px;color:var(–ink-soft)}
.pb-track{height:5px;background:var(–bg-soft);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* BOOKINGS */
.bookcard{background:var(–bg-card);border:.5px solid var(–line);border-radius:13px;
padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:transform .15s;
-webkit-tap-highlight-color:transparent}
.bookcard:active{transform:scale(.98)}
.bookcard.done{background:linear-gradient(to right,#f0f9eb,var(–bg-card));border-color:#c8e6a8}
.bookcard-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.bookcard h3{font-family:var(–sans);font-size:14.5px;font-weight:500;line-height:1.3}
.bookcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(–line);
flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bookcheck svg{display:block}
.bookcard.done .bookcheck{background:#4a7c3a;border-color:#4a7c3a;color:#fff}
.bookwhere{font-size:11.5px;color:var(–ink-soft);margin-bottom:3px}
.bookwhen{font-size:11.5px;font-weight:500;color:var(–accent);margin-bottom:3px}
.bookcard.done .bookwhen{color:#4a7c3a}
.booknotes{font-size:11.5px;color:var(–ink-soft);line-height:1.4}

/* FOOD */
.food-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:11px;
margin-bottom:14px;scrollbar-width:none}
.food-filters::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;background:transparent;border:.5px solid var(–line);
border-radius:999px;padding:5px 11px;font-size:12px;color:var(–ink-soft);
cursor:pointer;transition:all .15s;font-family:var(–sans)}
.fchip.active{background:var(–ink);color:var(–bg);border-color:var(–ink)}
.foodcard{background:var(–bg-card);border:.5px solid var(–line);
border-radius:13px;padding:13px 15px;margin-bottom:8px}
.foodcard-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:3px}
.foodname{font-size:14.5px;font-weight:500;flex:1}
.foodprice{font-family:var(–serif);font-size:14px;color:var(–gold)}
.foodwhat{font-size:12.5px;color:var(–ink);line-height:1.4;margin-bottom:5px}
.foodmeta{display:flex;gap:9px;font-size:11px;color:var(–ink-faint);margin-top:5px}
.foodtype{background:var(–bg-soft);color:var(–ink-soft);padding:1px 7px;border-radius:4px;font-weight:500}

/* COSTCO */
.costo-section{margin-bottom:20px}
.costo-sec-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;
color:var(–ink-faint);margin-bottom:9px;padding-bottom:5px;
border-bottom:.5px solid var(–line);font-weight:600}
.costoitem{display:flex;align-items:center;padding:11px 0;
border-bottom:.5px solid var(–line-soft);cursor:pointer;
-webkit-tap-highlight-color:transparent;gap:11px}
.costocheck{width:22px;height:22px;border-radius:6px;border:1.5px solid var(–line);
flex-shrink:0;display:flex;align-items:center;justify-content:center;
transition:all .15s;background:var(–bg-card)}
.costocheck svg{display:block}
.costoitem.checked .costocheck{background:var(–palm);border-color:var(–palm);color:#fff}
.costoitem.checked .costoname{text-decoration:line-through;color:var(–ink-faint)}
.costotext{flex:1}
.costoname{font-size:13.5px;font-weight:500;line-height:1.3}
.costonote{font-size:11px;color:var(–ink-faint);margin-top:2px}

/* MENU SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;
opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:auto}
.menusheet{position:fixed;bottom:0;left:0;right:0;background:var(–bg);
border-radius:22px 22px 0 0;z-index:201;padding:10px 22px calc(22px + env(safe-area-inset-bottom));
max-width:480px;margin:0 auto;transform:translateY(100%);
transition:transform .25s cubic-bezier(.22,1,.36,1)}
.menusheet.open{transform:translateY(0)}
.menuhandle{width:34px;height:4px;background:var(–line);border-radius:2px;margin:7px auto 16px}
.menulist{list-style:none}
.menuitem{display:flex;align-items:center;gap:13px;padding:13px 0;
border-bottom:.5px solid var(–line-soft);cursor:pointer;font-size:14.5px;
-webkit-tap-highlight-color:transparent}
.menuitem svg{display:block;color:var(–ink-soft)}
.menuitem:last-child{border-bottom:none}
.menuitem:active{color:var(–accent)}

/* FOOTER */
.footnote{text-align:center;font-size:11px;color:var(–ink-faint);
padding:28px 18px 14px;font-family:var(–serif);font-style:italic}

/* PIN LOCK SCREEN */
#lockscreen{
position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
background:var(–bg);
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:32px 24px calc(32px + env(safe-area-inset-bottom));
transition:opacity .35s ease, transform .35s ease;
overflow:hidden;
touch-action:none;
}
#lockscreen.unlocking{opacity:0;transform:scale(1.04);pointer-events:none}
.lock-icon{
width:64px;height:64px;border-radius:20px;
background:var(–bg-soft);border:.5px solid var(–line);
display:flex;align-items:center;justify-content:center;
margin-bottom:20px;
color:var(–accent);
}
.lock-title{font-family:var(–serif);font-size:26px;font-weight:500;
color:var(–ink);letter-spacing:-.01em;margin-bottom:5px;text-align:center}
.lock-sub{font-size:12.5px;color:var(–ink-soft);text-align:center;margin-bottom:32px}
.pin-dots{display:flex;gap:14px;margin-bottom:36px}
.pin-dot{
width:13px;height:13px;border-radius:50%;
border:1.5px solid var(–line);background:transparent;
transition:all .15s cubic-bezier(.34,1.56,.64,1);
}
.pin-dot.filled{background:var(–accent);border-color:var(–accent);transform:scale(1.15)}
.pin-dot.error{background:#ef4444;border-color:#ef4444}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px}
.pin-key{
height:68px;border-radius:15px;border:.5px solid var(–line);
background:var(–bg-card);color:var(–ink);font-size:22px;font-weight:400;
font-family:var(–serif);cursor:pointer;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
transition:transform .1s ease, background .1s, box-shadow .1s;
-webkit-tap-highlight-color:transparent;
box-shadow:0 1px 3px rgba(0,0,0,.05);
user-select:none;
}
.pin-key:active{transform:scale(.94);background:var(–bg-soft)}
.pin-key .key-sub{font-family:var(–sans);font-size:8px;letter-spacing:.12em;
color:var(–ink-faint);text-transform:uppercase;font-weight:600;line-height:1}
.pin-key.del{font-size:16px;color:var(–ink-soft)}
.pin-key.empty{border:none;background:transparent;box-shadow:none;cursor:default}
.pin-key.empty:active{transform:none}
.lock-error{font-size:12px;color:#ef4444;text-align:center;
margin-top:-24px;margin-bottom:16px;min-height:16px;
opacity:0;transition:opacity .2s}
.lock-error.show{opacity:1}
@keyframes shake{
0%,100%{transform:translateX(0)}
20%{transform:translateX(-7px)}
40%{transform:translateX(7px)}
60%{transform:translateX(-5px)}
80%{transform:translateX(4px)}
}
.pin-dots.shake{animation:shake .38s ease}
</style>

</head>
<body>

<!-- PIN LOCK SCREEN -->

<div id="lockscreen">

    if(e.weather) blocks+='<div class="detblock"><div class="detlbl weather">'+icon('cloud',11)+' Weather note</div><div class="detval">'+e.weather+'</div></div>';
    if(e.alternates&&e.alternates.length){
      var lis=e.alternates.map(function(a){return '<li>'+a+'</li>';}).join('');
      blocks+='<div class="detblock"><div class="detlbl alt">'+icon('replace',11)+' Alternatives</div><div class="detval"><ul>'+lis+'</ul></div></div>';
    }
    details='<div class="evdetails"><div class="det-inner"><div class="det-sep"></div>'+blocks+'</div></div>';
  }

  return '<div class="tl-event'+(open?' open':'')+'" data-key="'+key+'">'
    +'<div class="evtime">'+tParts[1]+'<small>'+tParts[2]+'</small></div>'
    +'<div class="evbody">'
    +'<div class="evrow">'
    +'<div class="evicon">'+icon(iconName,18)+'</div>'
    +'<div class="evtitle">'+e.title+'</div>'
    +(hasDetails?'<div class="evchev">'+icon('chevron-down',16)+'</div>':'')
    +'</div>'
    +(e.details?'<div class="evdesc">'+e.details+'</div>':'')
    +hintsFor(e)
    +details
    +'</div></div>';
}

function renderToday(){
  var day=currentDay();
  var todIso=todayIso();
  var chips=DATA.days.map(function(d){
    var cls='daychip'+(d.iso===day.iso?' active':'')+(d.iso===todIso?' today':'');
    var lab=d.label;
    var dateShort=d.date.split(' ').slice(1).join(' ');
    return '<button class="'+cls+'" data-iso="'+d.iso+'">'+lab+'<span class="chipdate">'+dateShort+'</span></button>';
  }).join('');

  var events=day.events.map(function(e,i){return renderEvent(e,i,day.iso);}).join('');

  return '<div class="page active th-'+day.color+'" id="pg-today">'
    +'<div class="daypicker" id="dpicker">'+chips+'</div>'
    +'<div class="hero">'
    +'<svg class="hero-palm" viewBox="0 0 165 295" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M80 84 Q28 68 2 88" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round"/><path d="M80 84 Q34 46 12 18" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round"/><path d="M80 84 Q58 36 50 4" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round"/><path d="M80 84 Q74 36 76 2" fill="none" stroke="currentColor" stroke-width="15" stroke-linecap="round"/><path d="M80 84 Q102 38 114 4" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round"/><path d="M80 84 Q124 44 148 18" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round"/><path d="M80 84 Q130 68 160 86" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round"/><path d="M82 290 C80 254 76 212 74 174 C72 142 74 112 80 84" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round"/></svg>'
    +'<p class="hero-greeting">'+(day.iso===todIso?'Today':'Looking at')+' · <strong>'+day.date+'</strong></p>'
    +'<h1>'+day.theme+'</h1>'
    +'<div class="hero-meta">'
    +'<span>'+icon(day.car?'car':'walk',14)+' '+(day.car?'Car day':'No car')+'</span>'
    +'<span>'+icon('list',14)+' '+day.events.length+' stops</span>'
    +'</div>'
    +'<p class="hero-summary">'+day.summary+'</p>'
    +'</div>'
    +'<div class="wxstrip">'
    +'<div class="wxcell"><div class="wx-lbl">High</div><div class="wx-val">'+day.weather.high+'</div></div>'
    +'<div class="wxcell"><div class="wx-lbl">Rain</div><div class="wx-val">'+day.weather.rain+'</div></div>'
    +'<div class="wxcell"><div class="wx-lbl">Note</div><div class="wx-val sm">'+day.weather.note+'</div></div>'
    +'</div>'
    +'<div class="timeline">'+events+'</div>'
    +'<p class="footnote">— Aloha —</p>'
    +'</div>';
}

function renderTrip(){
  var stats='<div class="meta-grid">'
    +'<div class="metastat"><div class="mlbl">Hotel</div><div class="mval">Bamboo Waikiki</div><div class="msub">Kuhio Ave, Honolulu</div></div>'
    +'<div class="metastat"><div class="mlbl">Duration</div><div class="mval">9 days</div><div class="msub">8 nights</div></div>'
    +'<div class="metastat"><div class="mlbl">Car · Hertz</div><div class="mval">7 days</div><div class="msub">$251 weekly</div></div>'
    +'<div class="metastat"><div class="mlbl">Pickup</div><div class="mval">May 12</div><div class="msub">Hyatt Regency</div></div>'
    +'</div>';

  var contacts=DATA.quickContacts.map(function(c){
    var iconName=c.icon.replace('ti-','');
    return '<div class="contactbtn"'+(c.phone?' onclick="window.location.href=\'tel:'+c.phone+'\'"':'')+'>'
      +'<div class="ci">'+icon(iconName,17)+'</div>'
      +'<div class="ct">'+c.name+(c.phone?'<small>'+c.phone+'</small>':'')+'</div>'
      +'</div>';
  }).join('');

  var cards=DATA.days.map(function(d,i){
    return '<div class="daycard th-'+d.color+'" data-jump="'+d.iso+'">'
      +'<div class="dcnum">'+(i+1)+'<small>'+d.date.split(' ').slice(1).join(' ')+'</small></div>'
      +'<div class="dcbody"><div class="dctitle">'+d.theme+'</div>'
      +'<div class="dcsub">'+d.events.length+' stops · '+(d.car?'Car':'No car')+' · '+d.weather.high+'</div></div>'
      +'<div class="dcarrow">'+icon('chevron-right',16)+'</div>'
      +'</div>';
  }).join('');

  return '<div class="page active" id="pg-trip">'
    +'<div class="trip-hero"><h1>Aloha,<br><em>Oahu</em></h1>'
    +'<p class="dates">May 11 — 19, 2026</p></div>'
    +'<div class="sec-title">At a glance</div>'+stats
    +'<div class="sec-title">Quick contacts</div>'
    +'<div class="contact-grid">'+contacts+'</div>'
    +'<div class="sec-title">The week</div>'
    +'<div class="daycards">'+cards+'</div>'

function renderBookings(){
  var total=DATA.bookings.length;
  var done=DATA.bookings.filter(function(b){return state.booksDone.has(b.what);}).length;
  var pct=Math.round(done/total*100);
  var pb='<div class="progress-bar"><div class="pb-row"><span>Progress</span><span style="color:var(--accent);font-weight:500;">'+pct+'%</span></div><div class="pb-track"><div class="pb-fill" style="width:'+pct+'%;background:var(--accent);"></div></div></div>';
  var cards=DATA.bookings.map(function(b){
    var d=state.booksDone.has(b.what);
    return '<div class="bookcard'+(d?' done':'')+'" data-booking="'+b.what.replace(/"/g,'&quot;')+'">'
      +'<div class="bookcard-hd"><h3>'+b.what+'</h3>'
      +'<div class="bookcheck">'+(d?icon('check',13):'')+'</div></div>'
      +'<div class="bookwhere">'+b.where+'</div>'
      +'<div class="bookwhen">'+b.when+'</div>'
      +'<div class="booknotes">'+b.notes+'</div>'
      +'</div>';
  }).join('');
  return '<div class="page active listpage" id="pg-book">'
    +'<h1>Bookings</h1><p class="pagesub">'+done+' of '+total+' confirmed</p>'
    +pb+cards+'<p class="footnote">— Book early, sleep well —</p></div>';
}

function renderFood(){
  var types=['all'].concat([...new Set(DATA.foodGuide.map(function(f){return f.type;}))]);
  var filtered=state.foodFilter==='all'?DATA.foodGuide:DATA.foodGuide.filter(function(f){return f.type===state.foodFilter;});
  var chips=types.map(function(t){return '<button class="fchip'+(state.foodFilter===t?' active':'')+'" data-filter="'+t+'">'+t+'</button>';}).join('');
  var cards=filtered.map(function(f){
    return '<div class="foodcard">'
      +'<div class="foodcard-row"><div class="foodname">'+f.name+'</div><div class="foodprice">'+f.price+'</div></div>'
      +'<div class="foodwhat">'+f.what+'</div>'
      +'<div class="foodmeta"><span class="foodtype">'+f.type+'</span><span>'+f.when+'</span></div>'
      +'</div>';
  }).join('');
  return '<div class="page active listpage" id="pg-food">'
    +'<h1>Food</h1><p class="pagesub">'+DATA.foodGuide.length+' carefully chosen stops</p>'
    +'<div class="food-filters">'+chips+'</div>'+cards
    +'<p class="footnote">Try everything once</p></div>';
}

function renderCostco(){
  var groups={};
  DATA.costco.forEach(function(item){if(!groups[item.category])groups[item.category]=[];groups[item.category].push(item);});
  var total=DATA.costco.length,got=state.costcoChecked.size,pct=Math.round(got/total*100);
  var pb='<div class="progress-bar"><div class="pb-row"><span>In cart</span><span style="color:var(--palm);font-weight:500;">'+got+' of '+total+'</span></div><div class="pb-track"><div class="pb-fill" style="width:'+pct+'%;background:var(--palm);"></div></div></div>';
  var sections=Object.entries(groups).map(function(e){
    var cat=e[0],items=e[1];
    var rows=items.map(function(item){
      var chk=state.costcoChecked.has(item.item);
      return '<div class="costoitem'+(chk?' checked':'')+'" data-costco="'+item.item.replace(/"/g,'&quot;')+'">'
        +'<div class="costocheck">'+(chk?icon('check',13):'')+'</div>'
        +'<div class="costotext"><div class="costoname">'+item.item+'</div><div class="costonote">'+item.note+'</div></div>'
        +'</div>';
    }).join('');
    return '<div class="costo-section"><div class="costo-sec-title">'+cat+'</div>'+rows+'</div>';
  }).join('');
  return '<div class="page active listpage" id="pg-costco">'
    +'<h1>Costco list</h1><p class="pagesub">Iwilei · Open 10 AM · Tue May 12</p>'
    +pb+sections+'<p class="footnote">— Black card · 2% back —</p></div>';
}

function render(){
  var m=document.getElementById('main');
  var html='';
  if(state.page==='today') html=renderToday();
  else if(state.page==='trip') html=renderTrip();
  else if(state.page==='bookings') html=renderBookings();
  else if(state.page==='food') html=renderFood();
  else if(state.page==='costco') html=renderCostco();
  m.innerHTML=html;
  attach();
  document.querySelectorAll('.navbtn').forEach(function(b){b.classList.toggle('active',b.dataset.page===state.page);});
  m.scrollTop=0;
}

function attach(){
  // Day picker
  document.querySelectorAll('.daychip').forEach(function(c){
    c.addEventListener('click',function(){state.dayIso=c.dataset.iso;state.expandedKey=null;render();});
  });
  // Timeline events
  document.querySelectorAll('.tl-event').forEach(function(el){
    el.addEventListener('click',function(){
      var k=el.dataset.key;
      state.expandedKey=state.expandedKey===k?null:k;
      el.classList.toggle('open');
      if(state.expandedKey===k) setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'nearest'});},280);
    });
  });
  // Bookings
  document.querySelectorAll('.bookcard').forEach(function(el){
    el.addEventListener('click',function(){
      var k=el.dataset.booking;
      if(state.booksDone.has(k)) state.booksDone.delete(k); else state.booksDone.add(k);
      localStorage.setItem('bd',JSON.stringify([...state.booksDone]));render();
    });
  });
  // Costco
  document.querySelectorAll('.costoitem').forEach(function(el){
    el.addEventListener('click',function(){
      var k=el.dataset.costco;
      if(state.costcoChecked.has(k)) state.costcoChecked.delete(k); else state.costcoChecked.add(k);
      localStorage.setItem('ck',JSON.stringify([...state.costcoChecked]));render();
    });
  });
  // Food filter
  document.querySelectorAll('.fchip').forEach(function(c){
    c.addEventListener('click',function(){state.foodFilter=c.dataset.filter;render();});
  });
  // Day card jump
  document.querySelectorAll('.daycard').forEach(function(c){
    c.addEventListener('click',function(){state.dayIso=c.dataset.jump;state.page='today';render();});
  });
}

// Nav listeners and render — called after unlock
function initApp(){
  document.querySelectorAll('.navbtn').forEach(function(b){
    b.addEventListener('click',function(){
      state.page=b.dataset.page;state.expandedKey=null;
      if(b.dataset.page==='today') state.dayIso=null;
      render();
    });
  });

  var overlay=document.getElementById('overlay'),sheet=document.getElementById('msheet');
  document.getElementById('menubtn').addEventListener('click',function(){overlay.classList.add('open');sheet.classList.add('open');});
  overlay.addEventListener('click',function(){overlay.classList.remove('open');sheet.classList.remove('open');});
  document.querySelectorAll('.menuitem').forEach(function(it){
    it.addEventListener('click',function(){
      var a=it.dataset.action;
      if(a==='reset-costco'){if(confirm('Reset Costco list?')){state.costcoChecked.clear();localStorage.setItem('ck','[]');render();}}
      else if(a==='reset-bookings'){if(confirm('Reset bookings?')){state.booksDone.clear();DATA.bookings.forEach(function(b){if(b.done)state.booksDone.add(b.what);});localStorage.setItem('bd',JSON.stringify([...state.booksDone]));render();}}
      else if(a==='about'){alert('Aloha! 🌺\nYour Oahu itinerary · works offline\nProgress saves to your device.');}
      overlay.classList.remove('open');sheet.classList.remove('open');
    });
  });

  render();
}

// PIN LOCK
(function(){
  var PIN='1091';
  var entered='';
  var dots=document.querySelectorAll('.pin-dot');
  var errorEl=document.getElementById('lockError');
  var dotsWrap=document.getElementById('pinDots');
  var lockEl=document.getElementById('lockscreen');
  var appEl=document.getElementById('app');

  function updateDots(){
    dots.forEach(function(d,i){
      d.classList.toggle('filled', i < entered.length);
      d.classList.remove('error');
    });
  }

  function wrongPin(){
    dots.forEach(function(d){ d.classList.add('error'); d.classList.remove('filled'); });
    dotsWrap.classList.add('shake');
    errorEl.classList.add('show');
    setTimeout(function(){
      dotsWrap.classList.remove('shake');
      entered='';
      updateDots();
    },400);
  }

  function tryUnlock(){
    if(entered===PIN){
      lockEl.classList.add('unlocking');
      setTimeout(function(){
        lockEl.style.display='none';
        appEl.style.display='';
        initApp();
      },360);
    } else {
      wrongPin();
    }
  }

  document.querySelectorAll('.pin-key[data-n]').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(entered.length>=4) return;
      errorEl.classList.remove('show');
      entered+=btn.dataset.n;
      updateDots();
      if(entered.length===4) setTimeout(tryUnlock,120);
    });
  });

  document.getElementById('pinDel').addEventListener('click',function(){
    if(entered.length>0){
      entered=entered.slice(0,-1);
      errorEl.classList.remove('show');
      updateDots();
    }
  });
})();

</script>
